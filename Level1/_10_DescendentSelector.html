<!DOCTYPE html>
<html lang="en">
<head>
    <title>Selector</title>
    <style>
        #first p{
            color:darkseagreen;
        }
        p{
            color:coral;
        }
    </style>
</head>
<body>
    <div id="first">
        <p>This is a paragraph inside the div with id 'first'.</p>
    </div>
    <p>This is a paragraph outside the div with id 'first'.</p>
</body>
</html>
